<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio2</title>
</head>
<body>
    <table border="0" width="500">
        <tr>
            <td><form>Fecha:<input type="text" name="fecha" value="mm / dd / yyyy" size="14"></form></td>
        </tr>
        <tr>
            <td><form>Tiempo:<input type="text" name="tiempo" value="--:-- --" size="10"></form></td>
        </tr>
        <tr>
            <td><form>Fecha y hora de nacimiento:<input type="text" name="fecha y hora" size="20"></form></td>
        </tr>
        <tr>
            <td><form>Mes: <input type="text" name="mes" size="15"></form></td>
        </tr>
        <tr>
            <td><form>Semana: <input type="text" name="Semana" size="20"></form></td>
        </tr>
        <tr>
            <td><form>Número(min -10, max 10): <input type="number" name="numero" min="-10" max="10" size="20" value="0"></form></td>
        </tr>
        <tr>
            <td><form>Intervalo(min 0, max 10): <input type="range" name="intevalo" min="0" max="10" size="20" value="0"></form></td>
        </tr>
        <tr>
            <td><form>Teléfono: <input type="tel" name="telefono" size="10"></form></td>
        </tr>
        <tr>
            <td><form>Termino de búsqueda: <input type="search" name="busqueda" size="20"></form></td>
        </tr>
        <tr>
            <td><form>Color favorito: <input type="color" name="color" size="20"></form></td>
        </tr>
        <tr>
            <td><form><input type="submit" name="submit" size="10" value="Submit!"></form></td>
        </tr>
    </table>
</body>
</html>
